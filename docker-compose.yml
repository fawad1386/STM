services:
  ml:
    build: ./nlp
    restart: unless-stopped
    environment:
      MODEL_TYPE: transformer
      ML_PORT: 5001
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      ML_SERVICE_URL: http://ml:5001
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "5000:5000"
    depends_on:
      ml:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
